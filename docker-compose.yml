services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL publique inlinée au build (canonical, OG, sitemap, robots).
        # Surcharge : NEXT_PUBLIC_SITE_URL=https://votre-domaine.io docker compose build
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: dockcontrol-home:latest
    container_name: dockcontrol-home
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
